spring:
  application:
    name: clinmind-runtime
  flyway:
    enabled: false

server:
  port: 8080

logging:
  level:
    com.clinmind.runtime: INFO

clinmind:
  persistence:
    mode: in-memory
  debug-api:
    enabled: true
    require-debug-token: false
    debug-token: ""
  python-provider:
    enabled: false
    base-url: http://localhost:18080
    timeout-ms: 3000
