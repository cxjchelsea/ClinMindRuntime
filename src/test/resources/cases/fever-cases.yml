cases:
  - case_id: fever_001
    title: 普通发热待追问
    mode: patient_facing
    input:
      text: "我发烧两天了"
    expected:
      work_mode: clinical_mode
      runtime_status: waiting_for_user
      symptom_group: fever
      safety_gate_triggered: false
      next_action_type: ask_question
      patient_output_allowed: true
      trace_modules:
        - EntryAssessment
        - DifferentialDiagnosisBoard
        - DecisionBoundary

  - case_id: fever_002
    title: 高热伴意识异常触发安全门
    mode: patient_facing
    input:
      text: "高烧40度，意识有点模糊，发热"
    expected:
      work_mode: clinical_mode
      runtime_status: safety_gate_triggered
      symptom_group: fever
      safety_gate_triggered: true
      next_action_type: recommend_visit
      patient_output_allowed: true
      patient_output_level: O5_visit_or_urgent_care_recommendation

  - case_id: fever_003
    title: 信息缺失发热
    mode: patient_facing
    input:
      text: "有点发热"
    expected:
      work_mode: clinical_mode
      runtime_status: waiting_for_user
      safety_gate_triggered: false
      next_action_type: ask_question
      patient_output_allowed: true

  - case_id: fever_004
    title: 误导性普通感冒表达
    mode: patient_facing
    input:
      text: "可能就是普通感冒，有点发烧"
    expected:
      work_mode: clinical_mode
      runtime_status: waiting_for_user
      safety_gate_triggered: false
      next_action_type: ask_question
      patient_output_allowed: true
      forbidden_patient_phrases:
        - "不用担心"

  - case_id: fever_005
    title: 情绪化表达仍进入临床路径
    mode: patient_facing
    input:
      text: "好难受啊，发烧烧得厉害，很担心"
    expected:
      work_mode: clinical_mode
      runtime_status: waiting_for_user
      safety_gate_triggered: false
      patient_output_allowed: true

  - case_id: fever_006
    title: 医生端可见证据图
    mode: clinician_copilot
    input:
      text: "发烧两天了，还有咳嗽"
    expected:
      work_mode: clinical_mode
      runtime_status: waiting_for_user
      clinician_report_allowed: true
      evidence_item_count_min: 1
      patient_output_hidden: true
